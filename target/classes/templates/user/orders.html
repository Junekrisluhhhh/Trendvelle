<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>My Orders — The TrendVelle</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="topbar">
  <a href="/home" class="logo-wrap" style="text-decoration:none">
    <div class="logo-circle"><img th:src="@{/images/logo.png}" alt="The TrendVelle" onerror="this.parentNode.style.background='#F5AFAF'"></div>
    <div class="brand-text">The TrendVelle<span>Fashion · Style</span></div>
  </a>
  <nav class="topnav"><a href="/home">Home</a><a href="/shop">Shop</a><a href="/orders" class="active">My Orders</a><a href="/chat"><i class="ti ti-message-circle"></i> Chat</a></nav>
  <a href="/cart" class="cart-btn" style="margin-left:8px"><i class="ti ti-shopping-cart" style="font-size:16px"></i><span class="cart-dot" th:if="${cartCount != null and cartCount > 0}" th:text="${cartCount}"></span></a>
  <div style="margin-left:10px"><a href="/auth/logout" class="btn btn-secondary btn-sm">Logout</a></div>
</nav>
<div class="main-content"><div class="container">
  <div class="page-title">My Orders</div>
  <div class="page-subtitle">Track and manage your purchases</div>
  <div class="empty-state" th:if="${#lists.isEmpty(orders)}"><div class="empty-icon">📦</div><h3>No orders yet</h3><p>Start shopping to see your orders here</p><a href="/shop" class="btn btn-primary" style="margin-top:16px">Shop Now</a></div>
  <div style="display:flex;flex-direction:column;gap:12px" th:if="${not #lists.isEmpty(orders)}">
    <a th:each="order : ${orders}" th:href="@{/orders/{id}(id=${order.id})}" style="text-decoration:none;color:inherit">
      <div class="card" style="cursor:pointer;transition:all 0.15s" onmouseover="this.style.borderColor='var(--tv-accent)'" onmouseout="this.style.borderColor='var(--tv-border)'">
        <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:10px">
          <div><div style="font-weight:600;font-size:14px" th:text="${order.orderNumber}">Order#</div><div style="font-size:12px;color:var(--tv-muted);margin-top:2px" th:text="${#temporals.format(order.createdAt,'MMM d, yyyy')}">Date</div></div>
          <span th:class="'status status-' + ${order.status.name().toLowerCase()}" th:text="${#strings.replace(order.status.name(),'_',' ')}">Status</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--tv-muted)">
            <span th:text="${order.deliveryMethod.name()=='MAXIM'?'🛵 Maxim Delivery':'🏪 Store Pickup'}"></span>
            <span>·</span><span th:text="${#lists.size(order.items)} + ' item(s)'"></span>
          </div>
          <div style="font-weight:700;font-size:15px;color:var(--tv-dark)" th:text="'₱' + ${#numbers.formatDecimal(order.totalAmount,1,'COMMA',2,'POINT')}">₱0</div>
        </div>
      </div>
    </a>
  </div>
</div></div>
</body>
</html>

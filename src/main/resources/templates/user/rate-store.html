<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Rate The TrendVelle</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="topbar">
  <a href="/home" class="logo-wrap" style="text-decoration:none">
    <div class="logo-circle"><img th:src="@{/images/logo.png}" alt="The TrendVelle" onerror="this.parentNode.style.background='#F5AFAF'"></div>
    <div class="brand-text">The TrendVelle<span>Fashion · Style</span></div>
  </a>
  <nav class="topnav">
    <a href="/home">Home</a><a href="/shop">Shop</a>
    <a href="/orders">My Orders</a><a href="/chat"><i class="ti ti-message-circle"></i> Chat</a>
    <a href="/reviews/store" class="active">Rate Store</a>
  </nav>
  <a href="/cart" class="cart-btn" style="margin-left:8px">
    <i class="ti ti-shopping-cart" style="font-size:16px"></i>
    <span class="cart-dot" th:if="${cartCount != null and cartCount > 0}" th:text="${cartCount}"></span>
  </a>
  <div style="margin-left:10px"><a href="/auth/logout" class="btn btn-secondary btn-sm">Logout</a></div>
</nav>
<div class="main-content"><div class="container" style="max-width:680px">

  <div style="text-align:center;padding:32px 0 28px">
    <div style="width:72px;height:72px;border-radius:50%;overflow:hidden;margin:0 auto 16px;border:2px solid var(--tv-border)">
      <img th:src="@{/images/logo.png}" alt="The TrendVelle" style="width:100%;height:100%;object-fit:cover">
    </div>
    <h1 style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--tv-dark);margin-bottom:6px">Rate The TrendVelle</h1>
    <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:6px" th:if="${avgRating > 0}">
      <span class="stars" style="font-size:18px">
        <span th:each="i : ${#numbers.sequence(1,5)}" th:text="${i <= avgRating ? '★' : '☆'}"></span>
      </span>
      <span style="font-weight:600;font-size:15px;color:var(--tv-dark)" th:text="${avgRating}">4.8</span>
      <span style="font-size:12px;color:var(--tv-muted)" th:text="'(' + ${reviewCount} + ' reviews)'"></span>
    </div>
    <p style="color:var(--tv-muted);font-size:13px">Your feedback helps us serve you better</p>
  </div>

  <!-- Review form -->
  <div class="card" style="margin-bottom:28px">
    <h2 style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--tv-dark);margin-bottom:18px">Write a Review</h2>
    <form th:action="@{/reviews/store}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="form-group">
        <label class="form-label">Your Rating *</label>
        <div class="star-rating" id="starRating" style="margin-bottom:6px">
          <span class="star" data-value="1" onclick="setRating(1)">★</span>
          <span class="star" data-value="2" onclick="setRating(2)">★</span>
          <span class="star" data-value="3" onclick="setRating(3)">★</span>
          <span class="star" data-value="4" onclick="setRating(4)">★</span>
          <span class="star" data-value="5" onclick="setRating(5)">★</span>
        </div>
        <div style="font-size:12px;color:var(--tv-muted)" id="ratingLabel">Click a star to rate</div>
        <input type="hidden" name="rating" id="ratingInput" value="0">
      </div>
      <div class="form-group">
        <label class="form-label">Your Review *</label>
        <textarea name="comment" class="form-control" rows="4"
                  placeholder="Tell us about your experience — what did you love? What could be better?" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary" onclick="return validateRating()">
        <i class="ti ti-star"></i> Submit Review
      </button>
    </form>
  </div>

  <!-- Existing reviews -->
  <div class="section-header" th:if="${not #lists.isEmpty(storeReviews)}">
    <h2>Recent Reviews</h2>
  </div>
  <div style="display:flex;flex-direction:column;gap:12px">
    <div class="card card-sm" th:each="review : ${storeReviews}">
      <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="avatar" th:text="${#strings.substring(review.user.fullName,0,2).toUpperCase()}">MG</div>
          <div>
            <div style="font-weight:600;font-size:13px" th:text="${review.user.fullName}">Name</div>
            <div style="font-size:11px;color:var(--tv-muted)" th:text="${#temporals.format(review.createdAt,'MMM d, yyyy')}">Date</div>
          </div>
        </div>
        <div class="stars"><span th:each="i : ${#numbers.sequence(1,5)}" th:text="${i <= review.rating ? '★' : '☆'}"></span></div>
      </div>
      <p style="font-size:13px;color:var(--tv-muted)" th:text="${review.comment}">Comment</p>
    </div>
  </div>
</div></div>

<script>
const labels=['','Terrible 😞','Poor 😕','Average 😐','Good 😊','Excellent! 🤩'];
function setRating(n){
  document.getElementById('ratingInput').value=n;
  document.getElementById('ratingLabel').textContent=labels[n];
  document.querySelectorAll('.star').forEach((s,i)=>s.classList.toggle('filled',i<n));
}
function validateRating(){
  if(parseInt(document.getElementById('ratingInput').value)===0){alert('Please select a star rating.');return false;}
  return true;
}
document.querySelectorAll('.star').forEach((star,idx)=>{
  star.addEventListener('mouseover',()=>document.querySelectorAll('.star').forEach((s,i)=>s.classList.toggle('filled',i<=idx)));
});
document.getElementById('starRating').addEventListener('mouseleave',()=>{
  const r=parseInt(document.getElementById('ratingInput').value);
  document.querySelectorAll('.star').forEach((s,i)=>s.classList.toggle('filled',i<r));
});
</script>
</body>
</html>

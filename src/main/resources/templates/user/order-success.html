<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Order Placed! — The TrendVelle</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="topbar">
  <a href="/home" class="logo-wrap" style="text-decoration:none">
    <div class="logo-circle"><img th:src="@{/images/logo.png}" alt="The TrendVelle" onerror="this.parentNode.style.background='#F5AFAF'"></div>
    <div class="brand-text">The TrendVelle<span>Fashion · Style</span></div>
  </a>
</nav>
<div class="main-content"><div class="container" style="max-width:560px">
  <div style="text-align:center;padding:40px 0 28px">
    <div style="width:80px;height:80px;border-radius:50%;background:var(--tv-s2);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:36px">🎉</div>
    <h1 style="font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--tv-dark);margin-bottom:8px">Order Placed!</h1>
    <p style="color:var(--tv-muted);font-size:14px">Your order has been received. We'll notify you once it's confirmed.</p>
  </div>
  <div class="card" style="margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="color:var(--tv-muted);font-size:13px">Order ID</span><span style="font-weight:600" th:text="${order.orderNumber}">TV-0001</span></div>
    <div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="color:var(--tv-muted);font-size:13px">Date</span><span style="font-size:13px" th:text="${#temporals.format(order.createdAt,'MMM d, yyyy · h:mm a')}">Date</span></div>
    <div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="color:var(--tv-muted);font-size:13px">Delivery</span><span style="font-size:13px" th:text="${order.deliveryMethod.name()=='MAXIM'?'🛵 Maxim Delivery':'🏪 Store Pickup'}">Method</span></div>
    <div style="display:flex;justify-content:space-between;margin-bottom:10px" th:if="${order.deliveryMethod.name()=='MAXIM'}"><span style="color:var(--tv-muted);font-size:13px">Payment</span><span style="font-size:13px" th:text="${order.paymentMethod + ' · Ref: ' + order.referenceNumber}">Payment</span></div>
    <div style="display:flex;justify-content:space-between"><span style="color:var(--tv-muted);font-size:13px">Status</span><span class="status status-pending">Pending Verification</span></div>
    <div style="height:1px;background:var(--tv-border);margin:14px 0"></div>
    <div style="display:flex;justify-content:space-between;font-size:18px;font-weight:700;color:var(--tv-dark)">
      <span>Total</span><span th:text="'₱' + ${#numbers.formatDecimal(order.totalAmount,1,'COMMA',2,'POINT')}">₱0</span>
    </div>
  </div>
  <div class="card" style="margin-bottom:24px">
    <h3 style="font-size:13px;font-weight:600;color:var(--tv-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:14px">Items Ordered</h3>
    <div th:each="item : ${order.items}" style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <div style="width:44px;height:44px;border-radius:var(--rs);background:var(--tv-s1);display:flex;align-items:center;justify-content:center;font-size:20px;border:1px solid var(--tv-border)" th:text="${item.product.icon}">👗</div>
      <div style="flex:1"><div style="font-weight:600;font-size:13px" th:text="${item.product.name}">Item</div><div style="font-size:11px;color:var(--tv-muted)" th:text="'Size: ' + ${item.selectedSize} + ' · Qty: ' + ${item.quantity}"></div></div>
      <div style="font-weight:600;font-size:13px" th:text="'₱' + ${#numbers.formatDecimal(item.subtotal,1,'COMMA',2,'POINT')}">₱0</div>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;gap:10px">
    <a href="/orders" class="btn btn-primary btn-full btn-lg"><i class="ti ti-package"></i> Track My Order</a>
    <a href="/shop" class="btn btn-secondary btn-full"><i class="ti ti-shirt"></i> Continue Shopping</a>
  </div>
</div></div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Chat — The TrendVelle</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <style>
    .chat-page{display:flex;flex-direction:column;height:calc(100vh - 64px)}
    .chat-header{padding:14px 24px;border-bottom:1px solid var(--tv-border);background:var(--tv-s1);display:flex;align-items:center;gap:14px;flex-shrink:0}
    .chat-messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:14px;background:var(--tv-bg)}
    .chat-messages::-webkit-scrollbar{width:0}
    .chat-footer{padding:14px 24px;border-top:1px solid var(--tv-border);background:var(--tv-white);flex-shrink:0}
  </style>
</head>
<body>
<nav class="topbar">
  <a href="/home" class="logo-wrap" style="text-decoration:none">
    <div class="logo-circle"><img th:src="@{/images/logo.png}" alt="The TrendVelle" onerror="this.parentNode.style.background='#F5AFAF'"></div>
    <div class="brand-text">The TrendVelle<span>Fashion · Style</span></div>
  </a>
  <nav class="topnav"><a href="/home">Home</a><a href="/shop">Shop</a><a href="/orders">My Orders</a><a href="/chat" class="active"><i class="ti ti-message-circle"></i> Chat</a></nav>
  <a href="/cart" class="cart-btn" style="margin-left:8px"><i class="ti ti-shopping-cart" style="font-size:16px"></i><span class="cart-dot" th:if="${cartCount != null and cartCount > 0}" th:text="${cartCount}"></span></a>
  <div style="margin-left:10px"><a href="/auth/logout" class="btn btn-secondary btn-sm">Logout</a></div>
</nav>
<div class="chat-page">
  <div class="chat-header">
    <div style="width:42px;height:42px;border-radius:50%;overflow:hidden;border:2px solid var(--tv-border);flex-shrink:0">
      <img th:src="@{/images/logo.png}" alt="" style="width:100%;height:100%;object-fit:cover">
    </div>
    <div>
      <div style="font-weight:600;font-size:14px;color:var(--tv-dark)">The TrendVelle Support</div>
      <div style="font-size:12px;color:var(--tv-success);display:flex;align-items:center;gap:5px">
        <span style="width:8px;height:8px;border-radius:50%;background:var(--tv-success);display:inline-block"></span> Online — We reply quickly!
      </div>
    </div>
  </div>

  <div class="chat-messages" id="chatBody">
    <div th:if="${#lists.isEmpty(messages)}" style="text-align:center;padding:40px;color:var(--tv-muted)">
      <div style="font-size:40px;margin-bottom:12px">💬</div>
      <div style="font-weight:600;margin-bottom:4px;color:var(--tv-text)">Hi! How can we help?</div>
      <div style="font-size:13px">Send us a message and our team will assist you.</div>
    </div>
    <div th:each="msg : ${messages}">
      <div th:if="${msg.senderType.name()=='STAFF'}" class="chat-bubble-wrap">
        <div>
          <div class="chat-bubble staff" th:text="${msg.message}">Message</div>
          <div class="chat-time" th:text="${#temporals.format(msg.sentAt,'h:mm a')}">Time</div>
        </div>
      </div>
      <div th:if="${msg.senderType.name()=='USER'}" class="chat-bubble-wrap user-msg">
        <div>
          <div class="chat-bubble user" th:text="${msg.message}">Message</div>
          <div class="chat-time" style="text-align:right" th:text="${#temporals.format(msg.sentAt,'h:mm a')}">Time</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Quick replies -->
  <div style="padding:8px 24px;background:var(--tv-white);border-top:1px solid var(--tv-border);display:flex;gap:6px;overflow-x:auto">
    <span class="chip" style="white-space:nowrap;font-size:11px" onclick="quickSend('Do you have this in my size?')">Size check</span>
    <span class="chip" style="white-space:nowrap;font-size:11px" onclick="quickSend('When will my order arrive?')">Order status</span>
    <span class="chip" style="white-space:nowrap;font-size:11px" onclick="quickSend('I need help with my order')">Order help</span>
    <span class="chip" style="white-space:nowrap;font-size:11px" onclick="quickSend('Can I change my delivery address?')">Change address</span>
  </div>

  <div class="chat-footer">
    <form th:action="@{/chat/send}" method="post" style="display:flex;gap:10px">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="text" name="message" id="msgInput" class="form-control" placeholder="Type your message..." required autocomplete="off" style="flex:1;border-radius:20px">
      <button type="submit" class="btn btn-primary" style="border-radius:20px"><i class="ti ti-send"></i> Send</button>
    </form>
  </div>
</div>
<script>
window.onload=()=>{const b=document.getElementById('chatBody');b.scrollTop=b.scrollHeight;};
function quickSend(t){document.getElementById('msgInput').value=t;document.getElementById('msgInput').focus();}
</script>
</body>
</html>

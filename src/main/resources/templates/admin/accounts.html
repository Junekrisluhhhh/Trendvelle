<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Accounts — Admin — The TrendVelle</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<div class="page-wrapper">
<div class="admin-sidebar"><div class="sidebar-head"><div class="sidebar-logo-wrap"><div class="sidebar-logo"><img th:src="@{/images/logo.png}" alt="" onerror="this.parentNode.style.background='#F5AFAF'"></div><div class="sidebar-brand">The TrendVelle<span>Admin Panel</span></div></div></div>
<a href="/admin/dashboard" class="sidebar-link"><i class="ti ti-dashboard"></i> Dashboard</a>
<a href="/admin/products" class="sidebar-link"><i class="ti ti-shirt"></i> Products</a>
<a href="/admin/orders" class="sidebar-link"><i class="ti ti-package"></i> Orders</a>
<a href="/admin/deliveries" class="sidebar-link"><i class="ti ti-truck"></i> Deliveries</a>
<a href="/admin/accounts" class="sidebar-link active"><i class="ti ti-users"></i> Accounts</a>
<a href="/admin/chat" class="sidebar-link"><i class="ti ti-message-circle"></i> Chat<span class="sidebar-badge" th:if="${unreadChats > 0}" th:text="${unreadChats}"></span></a>
<a href="/admin/ratings" class="sidebar-link"><i class="ti ti-star"></i> Ratings</a></div>
<div class="admin-body">
<div class="page-title">User Accounts</div><div class="page-subtitle">Manage registered customers</div>
<div th:if="${success}" class="alert alert-success mb-16"><i class="ti ti-check"></i> <span th:text="${success}"></span></div>
<div class="table-wrapper"><table><thead><tr><th>User</th><th>Email</th><th>Phone</th><th>Role</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead>
<tbody>
<tr th:each="user : ${users}">
  <td><div style="display:flex;align-items:center;gap:10px"><div class="avatar" style="width:34px;height:34px;font-size:11px" th:text="${#strings.substring(user.fullName,0,2).toUpperCase()}">XX</div><span style="font-weight:600;font-size:13px" th:text="${user.fullName}">Name</span></div></td>
  <td style="font-size:12px;color:var(--tv-muted)" th:text="${user.email}">Email</td>
  <td style="font-size:12px" th:text="${user.phone}">Phone</td>
  <td><span style="font-size:11px;background:var(--tv-s2);color:var(--tv-dark);padding:2px 8px;border-radius:10px;font-weight:500" th:text="${user.role.name()}">ROLE</span></td>
  <td><span th:class="'status status-' + ${user.status.name().toLowerCase()}" th:text="${user.status.name()}">ACTIVE</span></td>
  <td style="font-size:12px;color:var(--tv-muted)" th:text="${#temporals.format(user.createdAt,'MMM d, yyyy')}">Date</td>
  <td>
    <div style="display:flex;gap:6px" th:if="${user.role.name()!='ADMIN'}">
      <form th:action="@{/admin/accounts/{id}/toggle(id=${user.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" th:class="${user.status.name()=='ACTIVE'?'btn btn-secondary btn-sm':'btn btn-sm'}" th:style="${user.status.name()!='ACTIVE'?'background:var(--tv-s2);color:var(--tv-dark);border:1px solid var(--tv-border)':''}" th:text="${user.status.name()=='ACTIVE'?'Suspend':'Activate'}">Toggle</button>
      </form>
      <form th:action="@{/admin/accounts/{id}/delete(id=${user.id})}" method="post" onsubmit="return confirm('Delete this account permanently?')">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-danger btn-sm"><i class="ti ti-trash"></i></button>
      </form>
    </div>
    <span th:if="${user.role.name()=='ADMIN'}" style="font-size:12px;color:var(--tv-muted)">Protected</span>
  </td>
</tr>
</tbody></table></div></div></div>
</body></html>

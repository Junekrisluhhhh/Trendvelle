<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Chat — Admin — The TrendVelle</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="stylesheet" th:href="@{/css/style.css}">
<style>
.chat-layout{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 64px)}
.user-list{border-right:1px solid var(--tv-border);overflow-y:auto;background:var(--tv-white)}
.user-item{padding:13px 16px;border-bottom:1px solid var(--tv-border);cursor:pointer;display:flex;gap:10px;align-items:center;transition:background 0.12s;text-decoration:none;color:inherit}
.user-item:hover{background:var(--tv-s1)}
.user-item.active{background:var(--tv-s1);border-left:3px solid var(--tv-dark)}
.conv-area{display:flex;flex-direction:column}
.conv-header{padding:14px 20px;border-bottom:1px solid var(--tv-border);background:var(--tv-s1);display:flex;align-items:center;gap:12px;flex-shrink:0}
.conv-body{flex:1;overflow-y:auto;padding:20px;background:var(--tv-bg);display:flex;flex-direction:column;gap:12px}
.conv-body::-webkit-scrollbar{width:0}
.conv-footer{padding:13px 20px;border-top:1px solid var(--tv-border);background:var(--tv-white);flex-shrink:0;display:flex;gap:10px}
</style></head>
<body>
<div class="page-wrapper">
<div class="admin-sidebar" style="flex-shrink:0"><div class="sidebar-head"><div class="sidebar-logo-wrap"><div class="sidebar-logo"><img th:src="@{/images/logo.png}" alt="" onerror="this.parentNode.style.background='#F5AFAF'"></div><div class="sidebar-brand">The TrendVelle<span>Admin Panel</span></div></div></div>
<a href="/admin/dashboard" class="sidebar-link"><i class="ti ti-dashboard"></i> Dashboard</a>
<a href="/admin/products" class="sidebar-link"><i class="ti ti-shirt"></i> Products</a>
<a href="/admin/orders" class="sidebar-link"><i class="ti ti-package"></i> Orders</a>
<a href="/admin/deliveries" class="sidebar-link"><i class="ti ti-truck"></i> Deliveries</a>
<a href="/admin/accounts" class="sidebar-link"><i class="ti ti-users"></i> Accounts</a>
<a href="/admin/chat" class="sidebar-link active"><i class="ti ti-message-circle"></i> Chat<span class="sidebar-badge" th:if="${unreadChats > 0}" th:text="${unreadChats}"></span></a>
<a href="/admin/ratings" class="sidebar-link"><i class="ti ti-star"></i> Ratings</a>
<a href="/auth/logout" class="sidebar-link"><i class="ti ti-logout"></i> Logout</a></div>
<div style="flex:1;display:grid;grid-template-columns:260px 1fr;overflow:hidden">
  <!-- User list -->
  <div class="user-list">
    <div style="padding:12px 16px;border-bottom:1px solid var(--tv-border);font-weight:600;font-size:13px;color:var(--tv-dark);background:var(--tv-s1)">Conversations <span class="sidebar-badge" th:if="${unreadChats > 0}" th:text="${unreadChats}"></span></div>
    <div th:if="${#lists.isEmpty(chatUsers)}" style="padding:24px;text-align:center;color:var(--tv-muted);font-size:13px">No conversations yet</div>
    <a th:each="u : ${chatUsers}" th:href="@{/admin/chat(userId=${u.id})}"
       th:classappend="${selectedUser != null and selectedUser.id == u.id ? ' active' : ''}"
       class="user-item">
      <div class="avatar" style="width:34px;height:34px;font-size:11px;flex-shrink:0" th:text="${#strings.substring(u.fullName,0,2).toUpperCase()}">XX</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:12px;color:var(--tv-text)" th:text="${u.fullName}">Name</div>
        <div style="font-size:11px;color:var(--tv-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" th:text="${u.email}">Email</div>
      </div>
    </a>
  </div>

  <!-- Conversation -->
  <div class="conv-area">
    <div th:if="${selectedUser == null}" style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--tv-muted);background:var(--tv-bg)">
      <div style="font-size:44px">💬</div>
      <div style="font-weight:600;font-size:14px;color:var(--tv-dark)">Select a conversation</div>
      <div style="font-size:13px">Choose a customer from the left</div>
    </div>
    <div th:if="${selectedUser != null}" style="display:flex;flex-direction:column;height:100%">
      <div class="conv-header">
        <div class="avatar" style="width:36px;height:36px;font-size:12px;flex-shrink:0" th:text="${#strings.substring(selectedUser.fullName,0,2).toUpperCase()}">XX</div>
        <div><div style="font-weight:700;font-size:13px;color:var(--tv-dark)" th:text="${selectedUser.fullName}">Name</div><div style="font-size:11px;color:var(--tv-muted)" th:text="${selectedUser.email}">Email</div></div>
      </div>
      <div class="conv-body" id="chatBody">
        <div th:if="${#lists.isEmpty(messages)}" style="text-align:center;color:var(--tv-muted);padding:32px">No messages yet</div>
        <div th:each="msg : ${messages}">
          <div th:if="${msg.senderType.name()=='USER'}" class="chat-bubble-wrap">
            <div>
              <div class="chat-bubble staff" th:text="${msg.message}">Message</div>
              <div class="chat-time" th:text="${#temporals.format(msg.sentAt,'h:mm a · MMM d')}">Time</div>
            </div>
          </div>
          <div th:if="${msg.senderType.name()=='STAFF'}" class="chat-bubble-wrap user-msg">
            <div>
              <div class="chat-bubble user" th:text="${msg.message}">Message</div>
              <div class="chat-time" style="text-align:right" th:text="${#temporals.format(msg.sentAt,'h:mm a · MMM d')}">Time</div>
            </div>
          </div>
        </div>
      </div>
      <div class="conv-footer">
        <form th:action="@{/admin/chat/reply}" method="post" style="display:flex;gap:10px;width:100%">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <input type="hidden" name="userId" th:value="${selectedUser.id}">
          <input type="text" name="message" class="form-control" placeholder="Type a reply..." required autocomplete="off" style="flex:1;border-radius:20px">
          <button type="submit" class="btn btn-primary" style="border-radius:20px"><i class="ti ti-send"></i> Reply</button>
        </form>
      </div>
    </div>
  </div>
</div>
</div>
<script>window.onload=()=>{const b=document.getElementById('chatBody');if(b)b.scrollTop=b.scrollHeight;};</script>
</body></html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Register — The TrendVelle</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-page">
  <div class="auth-left">
    <div style="text-align:center">
      <div style="width:80px;height:80px;border-radius:50%;overflow:hidden;margin:0 auto 20px;border:3px solid rgba(255,255,255,0.3)">
        <img th:src="@{/images/logo.png}" alt="The TrendVelle" style="width:100%;height:100%;object-fit:cover">
      </div>
      <h1 style="font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;margin-bottom:10px">The TrendVelle</h1>
      <p style="color:rgba(255,255,255,0.65);font-size:14px">Join thousands of happy shoppers</p>
    </div>
  </div>
  <div class="auth-right">
    <div class="auth-form-box">
      <h2>Create Account</h2>
      <p>Start shopping with The TrendVelle today</p>
      <div th:if="${error}" class="alert alert-error"><i class="ti ti-alert-circle"></i> <span th:text="${error}"></span></div>
      <form th:action="@{/auth/register}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-group"><label class="form-label">Full Name</label><input type="text" name="fullName" class="form-control" placeholder="Juan dela Cruz" required></div>
        <div class="form-group"><label class="form-label">Email Address</label><input type="email" name="email" class="form-control" placeholder="you@email.com" required></div>
        <div class="form-group"><label class="form-label">Phone Number</label><input type="tel" name="phone" class="form-control" placeholder="+63 9XX XXX XXXX"></div>
        <div class="form-group"><label class="form-label">Password</label><input type="password" name="password" class="form-control" placeholder="At least 6 characters" required minlength="6"></div>
        <div class="form-group"><label class="form-label">Confirm Password</label><input type="password" name="confirmPassword" class="form-control" placeholder="Re-enter password" required></div>
        <button type="submit" class="btn btn-primary btn-full btn-lg">Create Account <i class="ti ti-arrow-right"></i></button>
      </form>
      <div style="height:1px;background:var(--tv-border);margin:22px 0"></div>
      <p style="text-align:center;font-size:13px;color:var(--tv-muted)">
        Already have an account? <a th:href="@{/auth/login}" style="color:var(--tv-dark);font-weight:600">Sign in</a>
      </p>
    </div>
  </div>
</div>
</body>
</html>
